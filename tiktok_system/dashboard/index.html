<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok System Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        .status {
            background: rgba(255,255,255,0.2);
            padding: 1rem 2rem;
            border-radius: 50px;
            display: inline-block;
            margin: 1rem 0;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            max-width: 800px;
            margin: 2rem auto;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .emoji { font-size: 2rem; }
        .btn {
            background: white;
            color: #667eea;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 1rem;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 TikTok System Dashboard</h1>
        <div class="status">✅ System Aktiv</div>
        
        <div class="features">
            <div class="feature">
                <div class="emoji">💰</div>
                <h3>Umsatz-Tracking</h3>
            </div>
            <div class="feature">
                <div class="emoji">📱</div>
                <h3>Content Manager</h3>
            </div>
            <div class="feature">
                <div class="emoji">💬</div>
                <h3>Kommentare</h3>
            </div>
            <div class="feature">
                <div class="emoji">🧪</div>
                <h3>A/B Tests</h3>
            </div>
        </div>
        
        <a href="/api/" class="btn">API Status prüfen</a>
    </div>
</body>
</html>
